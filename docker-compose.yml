services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB:  master2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: passer
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - spring-net
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - spring-net
    depends_on:
      - db
  app:
    build: .
    ports:
      - '8081:8081'
    networks:
      - spring-net
    depends_on:
      - db
volumes:
  pg-data:
  pgadmin-data:

networks:
  spring-net:



